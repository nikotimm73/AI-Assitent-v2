function filterCars({price, type, fuel, brand, minRange, ausstattungPrio, seats}) {
  const range = PRICE_RANGES[price] || {min:0, max:999999};
  return CAR_DB.filter(c => {
    const inPrice = c.priceNum >= range.min && c.priceNum <= range.max;
    const inType  = !type  ? true : c.type.toLowerCase()===type.toLowerCase();
    const inFuel  = !fuel  ? true : c.fuelType===fuel;
    const inBrand = !brand ? true : c.brand.toLowerCase()===brand.toLowerCase();
    // Reichweite: parse first number from range string (e.g. "355–578 km" → 355)
    const inRange = !minRange ? true : parseInt(c.range) >= minRange;
    // Ausstattung: check if car has the prioritized feature keywords
    const inAusstattung = !ausstattungPrio ? true : ausstattungPrio.some(kw =>
      c.ausstattung.some(a => a.toLowerCase().includes(kw.toLowerCase()))
    );
    // Sitzplätze
    const inSeats = !seats ? true : seats === "7"
      ? c.ausstattung.some(a => /7 sitze/i.test(a))
      : !c.ausstattung.some(a => /7 sitze/i.test(a));
    return inPrice && inType && inFuel && inBrand && inRange && inAusstattung && inSeats;
  });
}

/* ═══════════════════════════════════════════════════════════════════
   CAR CAROUSEL  (mit Mehrfachauswahl für Vergleich)
═══════════════════════════════════════════════════════════════════ */
function CarCarousel({cars, selectedIds, onToggleSelect, totalCount, onShowAll}) {
  const [imgErrors, setImgErrors] = useState({});
  const [hoveredId, setHoveredId] = useState(null);
  const MAX_CAROUSEL = 5;
  const shown = cars.slice(0, MAX_CAROUSEL);
  return (
    <div style={{margin:"10px 0 6px"}}>
      <div style={car.scroll}>
        {shown.map(c => {
          const isSelected = selectedIds.includes(c.id);
          const isHovered = hoveredId === c.id;
          const err = imgErrors[c.id];
          const brandColor = BRAND_COLORS[c.brand] || "#555";
          return (
            <div key={c.id}
              onClick={()=>onToggleSelect(c)}
              onMouseEnter={()=>setHoveredId(c.id)}
              onMouseLeave={()=>setHoveredId(null)}
              style={{...car.card,
                border: isSelected
                  ? "2.5px solid #FFCC00"
                  : isHovered
                    ? "2px solid #979797"
                    : "1px solid #E5E7EB",
                boxShadow: isHovered
                  ? "0 4px 12px rgba(0,0,0,0.08)"
                  : isSelected
                    ? "0 0 0 1px #FFCC00, 0 4px 12px rgba(255,204,0,0.18)"
                    : "0 1px 3px rgba(0,0,0,0.04)",
                cursor:"pointer",
                flexShrink:0,
              }}>
              {isSelected && <div style={car.badge}><CheckIcon/></div>}
              <div>
                <div style={car.imgWrap}>
                  {!err
                    ? <img src={c.img} alt={c.name} style={car.img} onError={()=>setImgErrors(p=>({...p,[c.id]:true}))}/>
                    : <div style={{...car.placeholder,background:`linear-gradient(135deg,${brandColor}dd,${brandColor}88)`}}>
                        <div style={car.pAbbr}>{c.brand.slice(0,3).toUpperCase()}</div>
                        <div style={car.pName}>{c.name}</div>
                      </div>
                  }
                </div>
                <div style={car.body}>
                  <div style={car.name}>{c.name} {c.gen} ({c.code})</div>
                  <div style={car.specs}>
                    <div><span style={car.lbl}>Hergestellt:</span> <strong>{c.years}</strong></div>
                    <div><span style={car.lbl}>Ab:</span> <strong>{c.price}</strong></div>
                    <div><span style={car.lbl}>Kraftstoff:</span> <strong>{c.fuel}</strong></div>
                    <div><span style={car.lbl}>Verbrauch:</span> <strong>{c.cons}</strong></div>
                    <div><span style={car.lbl}>Reichweite:</span> <strong>{c.range}</strong></div>
                  </div>
                  <div style={car.div}/>
                  <div style={car.check}><span style={{marginRight:7}}><CheckIcon/></span>Marke: {c.brand}</div>
                </div>
              </div>
            </div>
          );
        })}
        {totalCount > MAX_CAROUSEL && (
          <div style={car.allCard}>
            <div style={car.allCount}>{totalCount}</div>
            <div style={car.allLabel}>Modelle gefunden</div>
            <button style={car.allBtn} onClick={onShowAll}>Alle ansehen →</button>
          </div>
        )}
      </div>
    </div>
  );
}

function ComparisonTray({cars, onRemove, onCompare, onClear}) {
  if (cars.length === 0) return null;
  return (
    <div style={tray.wrap}>
      <div style={tray.inner}>
        <div style={tray.left}>
          <div style={tray.label}>Vergleich <span style={{color:"#888",fontWeight:400}}>{cars.length}/3</span></div>
          <div style={tray.slots}>
            {cars.map(c=>(
              <div key={c.id} style={tray.slot}>
                <img src={c.img} alt={c.name} style={{width:"100%",height:"100%",objectFit:"contain"}}
                  onError={e=>e.target.style.display="none"}/>
                <div style={tray.slotName}>{c.name.split(" ").pop()}</div>
                <button style={tray.slotX} onClick={()=>onRemove(c.id)}><CloseIcon size={9} color="#555"/></button>
              </div>
            ))}
            {Array.from({length:3-cars.length}).map((_,i)=>(
              <div key={i} style={tray.emptySlot}><span style={{fontSize:18,color:"#ccc"}}>+</span></div>
            ))}
          </div>
        </div>
        <div style={{display:"flex",gap:10,flexShrink:0}}>
          <button style={tray.clearBtn} onClick={onClear}>Zurücksetzen</button>
          <button style={{...tray.compareBtn,opacity:cars.length<2?0.45:1}} disabled={cars.length<2} onClick={onCompare}>
            Jetzt vergleichen →
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════
   INLINE COMPARISON TABLE (rendered inside chat)
═══════════════════════════════════════════════════════════════════ */
const COMPARE_ROWS=[
  {label:"Preis",      fn:c=>c.price,   best:"min"},
  {label:"Kraftstoff", fn:c=>c.fuel,    best:null},
  {label:"Verbrauch",  fn:c=>c.cons,    best:null},
  {label:"Reichweite", fn:c=>c.range,   best:"max"},
  {label:"ADAC Autotest",  fn:c=>c.autotest ? "Note "+c.autotest : "–",  best:"min_note"},
  {label:"Crashtest",  fn:c=>c.crashtest ? c.crashtest+"★" : "–",  best:null},
  {label:"Pannenstatistik", fn:c=>c.pannen||"–", best:null},
  {label:"Rückrufe",   fn:c=>c.rueckrufe===0 ? "✅ Keine" : "⚠️ "+c.rueckrufe, best:null},
  {label:"Autokosten/Monat", fn:c=>c.kopiM ? c.kopiM+" €" : "–", best:"min_kopi"},
  {label:"Baujahr",    fn:c=>c.years,   best:null},
  {label:"Typ",        fn:c=>c.type,    best:null},
];

function ComparisonTable({cars}) {
  const [imgErrors, setImgErrors] = useState({});
  if (!cars || cars.length < 2) return null;
  return (
    <div style={ct.wrap}>
      <div style={ct.scrollArea}>
        <table style={ct.table}>
          <thead>
            <tr style={{background:"#fff"}}>
              <th style={ct.thLabel}></th>
              {cars.map(c=>(
                <th key={c.id} style={ct.thCar}>
                  <div style={ct.carImgWrap}>
                    {!imgErrors[c.id]
                      ? <img src={c.img} alt={c.name} style={{width:"100%",height:"100%",objectFit:"contain"}}
                          onError={()=>setImgErrors(p=>({...p,[c.id]:true}))}/>
                      : <div style={{width:"100%",height:"100%",background:BRAND_COLORS[c.brand]||"#eee",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
                          <span style={{color:"#fff",fontWeight:700}}>{c.brand.slice(0,3)}</span>
                        </div>
                    }
                  </div>
                  <div style={ct.carName}>{c.name}</div>
                  <div style={ct.carGen}>{c.gen} ({c.code})</div>
                </th>
              ))}
            </tr>
          </thead>
          <tbody>
            {COMPARE_ROWS.map((row,i)=>{
              let bestId = null;
              if (row.best==="min") bestId = cars.reduce((a,b)=>a.priceNum<b.priceNum?a:b).id;
              else if (row.best==="max") { const vals = cars.map(c=>({id:c.id,v:parseInt(c.range)||0})); bestId = vals.reduce((a,b)=>a.v>b.v?a:b).id; }
              else if (row.best==="min_note") { const vals = cars.filter(c=>c.autotest).map(c=>({id:c.id,v:parseFloat(c.autotest.replace(",","."))})); if(vals.length>0) bestId = vals.reduce((a,b)=>a.v<b.v?a:b).id; }
              else if (row.best==="min_kopi") { const vals = cars.filter(c=>c.kopiM).map(c=>({id:c.id,v:c.kopiM})); if(vals.length>0) bestId = vals.reduce((a,b)=>a.v<b.v?a:b).id; }
              const bestLabels = {min:"Günstigster",max:"Beste Reichweite",min_note:"Bester Autotest",min_kopi:"Günstigster Unterhalt"};
              return (
                <tr key={i} style={{background:i%2===0?"#FAFAFA":"#fff"}}>
                  <td style={ct.tdLabel}>{row.label}</td>
                  {cars.map(c=>{
                    const isBest = bestId && c.id===bestId;
                    return (
                      <td key={c.id} style={{...ct.tdVal,background:isBest?"#FFFBEA":"inherit"}}>
                        {row.fn(c)}
                        {isBest&&<div style={ct.bestBadge}>{bestLabels[row.best]||"Bester Wert"}</div>}
                      </td>
                    );
                  })}
                </tr>
              );
            })}
            <tr style={{background:"#FAFAFA"}}>
              <td style={ct.tdLabel}>Ausstattung</td>
              {cars.map(c=>(
                <td key={c.id} style={{...ct.tdVal,verticalAlign:"top"}}>
                  {c.ausstattung.slice(0,5).map((a,i)=>(
                    <div key={i} style={{fontSize:11,color:"#555",marginBottom:4,display:"flex",alignItems:"center",gap:5}}>
                      <span style={{color:"#22c55e",flexShrink:0}}>✓</span>{a}
                    </div>
                  ))}
                </td>
              ))}
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  );
}
const ct={
  wrap:{borderRadius:10,border:"1px solid #E5E7EB",overflow:"hidden",margin:"10px 0 6px",background:"#fff"},
  scrollArea:{overflowX:"auto"},
  table:{width:"100%",borderCollapse:"collapse",minWidth:420},

      <div style={cr.list}>
        {data.rows.map((row,i)=>(

              {row.subtitle && <div style={cr.subtitle}>{row.subtitle}</div>}
            </div>
            <div style={cr.valueArea}>

            </div>
          </div>
        ))}
      </div>

  );
}

function HandoffModal({cars, ctx, onClose, onSelect, onRefine, onOpenAdac}) {
  const [imgErrors, setImgErrors] = useState({});
  const total = cars.length;

  const buildSearchUrl = () => {
    const params = [];
    if (ctx.brand) params.push(`prompt=${encodeURIComponent(ctx.brand)}`);
    else if (ctx.fuel) params.push(`prompt=${encodeURIComponent(ctx.fuel === "elektro" ? "Elektro" : ctx.fuel === "hybrid" ? "Hybrid" : ctx.fuel === "diesel" ? "Diesel" : "Benzin")}`);

    return `https://www.adac.de/rund-ums-fahrzeug/autokatalog/marken-modelle/autosuche/?${params.join("&")}`;
  };

  // Context summary tags
  const tags = [];
  if (ctx.brand) tags.push(ctx.brand);
  if (ctx.type)  tags.push(ctx.type);
  if (ctx.fuel)  tags.push(ctx.fuel === "elektro" ? "Elektro" : ctx.fuel === "hybrid" ? "Hybrid" : ctx.fuel === "diesel" ? "Diesel" : "Benzin");
  if (ctx.price) tags.push(ctx.price);

        </div>

        {/* Context Summary */}
        <div style={ho.contextBar}>
          <div style={ho.contextLabel}>Deine Suchkriterien:</div>

  const [adacPage,   setAdacPage]   = useState(false);
  const bottomRef = useRef(null);
  const inputRef  = useRef(null);
  const prevSelectedCount = useRef(0);
  const suppressDeselectDialog = useRef(false);

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:"smooth"}); }, [messages, typing]);

  // Detect when all cars are deselected by user → show recovery dialog
  useEffect(() => {
    if (suppressDeselectDialog.current) {
      suppressDeselectDialog.current = false;
      prevSelectedCount.current = selectedIds.length;
      return;
    }
    if (prevSelectedCount.current > 0 && selectedIds.length === 0 && lastCars.length > 0) {
      const ts2 = () => { const d=new Date(); return `Heute, ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`; };
      setMessages(p=>[...p,{
        id: Date.now()+Math.random(),
        role: "bot",
        time: ts2(),
        text: "Du hast alle Modelle abgewählt. Möchtest du die ursprüngliche Fahrzeugauswahl wieder sehen?",
        chips: ["Fahrzeugauswahl anzeigen","Neue Suche starten"],
      }]);
    }
    prevSelectedCount.current = selectedIds.length;
  }, [selectedIds, lastCars]);

  const ts = () => { const d=new Date(); return `Heute, ${d.getHours()}:${String(d.getMinutes()).padStart(2,"0")}`; };
  const addBot  = (msg) => setMessages(p=>[...p,{id:Date.now()+Math.random(),role:"bot", time:ts(),...msg}]);
  const addUser = (txt) => setMessages(p=>[...p,{id:Date.now(),              role:"user",time:ts(),text:txt}]);

  // Show carousel in new bot message
  const showCarousel = useCallback((cars, intro, ctxHint = {}) => {
    setLastCars(cars);
    const {brand, fuel, compareActive} = ctxHint;

    // ── Context-aware chips ──
    let chips = [];

    if (compareActive) {
      // Bereits Modelle ausgewählt → passende Optionen
      chips = [
        "Jetzt vergleichen",
        "Auswahl zurücksetzen",
        "Suche verfeinern",
      ];
    } else if (brand) {
      // Markensuche: auf Vergleich + markenspezifische Filter hinweisen
      chips = [
        "Modelle vergleichen",
        `Günstigstes ${brand}-Modell`,
        fuel === "elektro" ? "Alle Elektro-Modelle" : "Elektro-Alternativen",
        "Suche verfeinern",
      ];
    } else if (fuel === "elektro") {
      chips = [
        "Modelle vergleichen",
        "Reichweite vergleichen",
        "Günstigstes Elektroauto",
        "Suche verfeinern",
      ];
    } else {
      // Standard
      chips = [
        "Modelle vergleichen",
        "Mehr Details zu einem Modell",
        "Suche verfeinern",
      ];
    }

    addBot({
      text: intro,
      tip: "Klicke auf eine Kachel zum Auswählen oder Abwählen. Ausgewählte Modelle erscheinen als Chips über dem Eingabefeld.",
      cars,
      cta: "Du kannst mir auch im Chat weitere Fragen zu den Modellen stellen oder die Suche verfeinern.",
      chips,
    });
  }, []);

  const toggleSelect = (car) => {
    setSelectedIds(prev => {
      if (prev.includes(car.id)) return prev.filter(id=>id!==car.id);
      return [...prev, car.id];
    });
  };

  const selectedCars = selectedIds.map(id=>CAR_DB.find(c=>c.id===id)).filter(Boolean);

  const process = (txt, curStep, curCtx, curChip) => {

    // ══════════════════════════════════════════════════════════════
    //  EINSTIEGS-ROUTING: Welcome-Karten → passender Flow
    // ══════════════════════════════════════════════════════════════
    if (/passendes auto finden/i.test(txt) && curStep === "idle") {
      setStep("ask_intent");
      addBot({text:"Schön, dass du auf der Suche bist! Hast du schon ein bestimmtes Modell im Kopf, oder sollen wir gemeinsam das passende finden?", chips:["Ich weiß schon welches","Lass uns gemeinsam suchen"]});
      return;
    }
    if (curStep === "ask_intent") {
      if (/weiß schon|bestimmtes|konkretes|ich kenne/i.test(txt)) {
        setStep("ask_model_detail");
        addBot({text:"Super! Welches Modell interessiert dich? Nenne mir einfach Marke und Modell.", chips:["Tesla Model Y","VW ID.4","BMW iX1","Volvo XC40","Hyundai IONIQ 5"]});
        return;
      }
      // "Lass uns gemeinsam suchen" oder Freitext → geführte Suche
      setStep("idle");
      addBot({text:"Alles klar, lass uns gemeinsam suchen! Was für ein Auto schwebt dir vor?", chips:["Familienwagen","Sportwagen","Pendlerauto","Gewerbefahrzeug","Ich bin noch unsicher"]});
      return;
    }
    if (curStep === "ask_model_detail") {
      const match = CAR_DB.find(c => txt.toLowerCase().includes(c.name.toLowerCase()) || txt.toLowerCase().includes(c.brand.toLowerCase()));
      if (match) {
        setChip(match); setStep("detail");
        const crashStars = match.crashtest ? match.crashtest + " von 5 Sternen" : "gute Bewertung";
        const rueckrufTxt = match.rueckrufe > 0 ? "⚠️ "+match.rueckrufe+" offene(r) Rückruf(e)" : "✅ Keine offenen Rückrufe";
        addBot({text:`Hier ist dein Überblick zum **${match.name}**:\n\n• **Preis:** ${match.price}\n• **Antrieb:** ${match.fuel} · Verbrauch ${match.cons}\n• **Reichweite:** ${match.range}\n• **ADAC Autotest:** Note ${match.autotest||"–"}\n• **Crashtest:** ${crashStars}\n• **Pannenstatistik:** ${match.pannen||"–"}\n• **Rückrufe:** ${rueckrufTxt}\n• **Autokosten:** ca. ${match.kopiM||"–"} €/Monat\n\nWozu möchtest du mehr erfahren?`, chips:["Motorisierung","Ausstattung","Sicherheit & Crashtest","ADAC Autotest","Pannenstatistik","Ähnliche Modelle finden"]});
        return;
      }
      addBot({text:"Das Modell habe ich leider nicht in meiner Datenbank gefunden. Versuche es mit einem anderen Namen oder lass uns gemeinsam suchen.", chips:["Lass uns gemeinsam suchen","Tesla Model Y","VW ID.4","BMW iX1"]});
      return;
    }
    // ── Crashtest-Direkteinstieg ──
    if (/crashtest abrufen/i.test(txt) && curStep === "idle") {
      setStep("ask_model_crash");
      addBot({text:"Für welches Fahrzeug möchtest du den Crashtest abrufen? Nenne mir Marke und Modell.", chips:["Tesla Model Y","VW ID.4","BMW iX1","Volvo XC40","Hyundai IONIQ 5"]});
      return;
    }
    if (curStep === "ask_model_crash") {
      const match = CAR_DB.find(c => txt.toLowerCase().includes(c.name.toLowerCase()) || txt.toLowerCase().includes(c.brand.toLowerCase()));
      if (match) {
        setChip(match); setStep("detail");
        const stars = match.crashtest ? match.crashtest+" von 5 Sternen" : "gute Bewertung";
        const rueckrufTxt = match.rueckrufe > 0 ? "\n\n⚠️ **Achtung:** Für dieses Modell gibt es aktuell **"+match.rueckrufe+" offene(n) Rückruf(e)**." : "\n\n✅ Aktuell sind **keine offenen Rückrufe** bekannt.";
        addBot({text:`**${match.name}** – Crashtest-Ergebnis:\n\n🛡️ Euro NCAP: **${stars}**\n\nSerienmäßige Sicherheitsausstattung: Notbremsassistent, Spurhalteassistent, Müdigkeitserkennung und Verkehrszeichenerkennung.${rueckrufTxt}`, adacTip:{title:"ADAC Crashtest-Datenbank", text:"Detaillierte Ergebnisse zu Insassenschutz, Kindersicherheit, Fußgängerschutz und Assistenzsysteme.", cta:"Alle Crashtests auf adac.de", url:"https://www.adac.de/rund-ums-fahrzeug/autokatalog/crashtest/"}, chips:["Autokosten berechnen","Pannenstatistik","Ausstattung","Ähnliche Modelle finden"]});
        return;
      }
      addBot({text:"Das Modell habe ich nicht gefunden. Versuche einen anderen Namen.", chips:["Tesla Model Y","VW ID.4","BMW iX1","Volvo XC40"]});
      return;
    }
    // ── Autokosten-Direkteinstieg ──
    if (/autokosten berechnen/i.test(txt) && (curStep === "idle" || curStep === "detail")) {
      if (curChip) {
        const c = curChip;
        addBot({text:`**${c.name}** – ADAC Autokosten:\n\n💰 Monatlicher Gesamtunterhalt: ca. **${c.kopiM||"–"} €/Monat**\n\nDas beinhaltet: Wertverlust, Versicherung (Haftpflicht+Vollkasko), Kfz-Steuer, Wartung & Reparatur, ${c.fuelType==="elektro"?"Strom":"Kraftstoff"} und Reifenverschleiß.`, adacTip:{title:"ADAC Autokosten-Rechner", text:"Vergleiche die monatlichen Kosten verschiedener Modelle – oft überraschend anders als erwartet.", cta:"Zum Autokosten-Rechner", url:"https://www.adac.de/rund-ums-fahrzeug/auto-kaufen-verkaufen/autokosten/"}, chips:["Crashtest abrufen","Pannenstatistik","Ausstattung","Ähnliche Modelle finden"]});
        return;
      }
      setStep("ask_model_kosten");
      addBot({text:"Für welches Fahrzeug möchtest du die Autokosten berechnen?", chips:["Tesla Model Y","VW ID.4","BMW iX1","Volvo XC40","Hyundai IONIQ 5"]});
      return;
    }
    if (curStep === "ask_model_kosten") {
      const match = CAR_DB.find(c => txt.toLowerCase().includes(c.name.toLowerCase()) || txt.toLowerCase().includes(c.brand.toLowerCase()));
      if (match) {
        setChip(match); setStep("detail");
        addBot({text:`**${match.name}** – ADAC Autokosten:\n\n💰 Monatlicher Gesamtunterhalt: ca. **${match.kopiM||"–"} €/Monat**\n\n(Wertverlust, Versicherung, Steuer, Wartung, ${match.fuelType==="elektro"?"Strom":"Kraftstoff"}, Reifen)`, adacTip:{title:"ADAC Autokosten-Rechner", text:"Vergleiche die monatlichen Kosten verschiedener Modelle auf adac.de.", cta:"Zum Autokosten-Rechner", url:"https://www.adac.de/rund-ums-fahrzeug/auto-kaufen-verkaufen/autokosten/"}, chips:["Crashtest abrufen","Pannenstatistik","Ausstattung","Ähnliche Modelle finden"]});
        return;
      }
      addBot({text:"Modell nicht gefunden. Versuche einen anderen Namen.", chips:["Tesla Model Y","VW ID.4","BMW iX1","Volvo XC40"]});
      return;
    }
    // ── Pannenstatistik-Direkteinstieg ──
    if (/pannenstatistik einsehen/i.test(txt) && (curStep === "idle" || curStep === "detail")) {
      if (curChip) {
        const c = curChip;
        const pannen = c.pannen || PANNEN_BY_BRAND[c.brand] || "keine Daten";
        addBot({text:`**${c.name}** – ADAC Pannenstatistik:\n\n🔧 Bewertung: **${pannen}**\n\nDie häufigsten Pannenursachen bei ${c.brand}: Batterie- und Elektronikprobleme. Die Statistik basiert auf über 3,5 Mio. ADAC-Pannenhilfeeinsätzen pro Jahr.`, adacTip:{title:"ADAC Pannenstatistik", text:"Vollständige Auswertung nach Marke, Modell und Baujahr auf adac.de.", cta:"Zur Pannenstatistik", url:"https://www.adac.de/rund-ums-fahrzeug/unfall-schaden-panne/pannenstatistik/"}, chips:["Crashtest abrufen","Autokosten berechnen","Ausstattung","Ähnliche Modelle finden"]});
        return;
      }
      setStep("ask_model_pannen");
      addBot({text:"Für welches Fahrzeug oder welche Marke möchtest du die Pannenstatistik sehen?", chips:["Volvo","BMW","VW","Toyota","Tesla","Hyundai"]});
      return;
    }
    if (curStep === "ask_model_pannen") {
      const matchCar = CAR_DB.find(c => txt.toLowerCase().includes(c.name.toLowerCase()));
      const matchBrand = detectBrand(txt);
      if (matchCar) {
        setChip(matchCar); setStep("detail");
        const pannen = matchCar.pannen || PANNEN_BY_BRAND[matchCar.brand] || "keine Daten";
        addBot({text:`**${matchCar.name}** – Pannenstatistik: **${pannen}**\n\nHäufigste Ursachen bei ${matchCar.brand}: Batterie- und Elektronikprobleme.`, adacTip:{title:"ADAC Pannenstatistik", text:"Detaillierte Auswertung auf adac.de.", cta:"Zur Pannenstatistik", url:"https://www.adac.de/rund-ums-fahrzeug/unfall-schaden-panne/pannenstatistik/"}, chips:["Crashtest abrufen","Autokosten berechnen","Ähnliche Modelle finden"]});
        return;
      }
      if (matchBrand) {
        const pannen = PANNEN_BY_BRAND[matchBrand] || "keine Daten";
        addBot({text:`**${matchBrand}** – ADAC Pannenstatistik: **${pannen}**\n\nDie Bewertung basiert auf der Häufigkeit von Pannenhilfeeinsätzen im Verhältnis zum Fahrzeugbestand. Möchtest du ein konkretes ${matchBrand}-Modell ansehen?`, chips:CAR_DB.filter(c=>c.brand===matchBrand).slice(0,4).map(c=>c.name).concat(["Passendes Auto finden"])});
        return;
      }
      addBot({text:"Die Marke oder das Modell habe ich nicht gefunden.", chips:["Volvo","BMW","VW","Toyota","Tesla","Hyundai"]});
      return;
    }
    // ── Ähnliche Modelle finden (aus Detail heraus) ──
    if (/ähnliche modelle finden/i.test(txt) && curChip) {
      setStep("idle"); setChip(null);
      const c = curChip;
      const newCtx = {...curCtx, fuel:c.fuelType, type:c.type, brand:null};
      setCtx(newCtx);
      addBot({text:`Du suchst etwas Ähnliches wie den **${c.name}**? Lass uns das gemeinsam eingrenzen!`, chips:["Lass uns gemeinsam suchen"]});
      return;
    }

    // ══════════════════════════════════════════════════════════════
    //  BESTEHENDE FLOWS (Vergleich, Carousel, Dialog etc.)
    // ══════════════════════════════════════════════════════════════

    // ── Dialogischer Kriterien-Vergleich (wenn ≥2 Fahrzeuge ausgewählt) ──
    const selCars = selectedIds.map(id=>CAR_DB.find(c=>c.id===id)).filter(Boolean);
    if (selCars.length >= 2) {
      const criterionChips = ["Preis vergleichen","Kraftstoff vergleichen","Verbrauch vergleichen","Reichweite vergleichen","Baujahr vergleichen","Ausstattung vergleichen","Gesamtvergleich"];

      // Preis
      if (/\bpreis\b|kosten|budget|günsti/i.test(txt) && !/alle.*vergleich|gesamt/i.test(txt)) {
        const sorted = [...selCars].sort((a,b)=>a.priceNum-b.priceNum);
        const diff = sorted[sorted.length-1].priceNum - sorted[0].priceNum;
        addBot({
          criterionCompare: {
            title: "Preisvergleich",
            rows: sorted.map((c,i)=>({
              rank: i+1,
              name: c.name,
              subtitle: c.gen,
              value: c.price,
              isBest: i===0,
            })),
            summary: `Preisspanne: ${diff.toLocaleString("de-DE")} €. Der ${sorted[0].name} ist am günstigsten.`,
          },
          chips: criterionChips.filter(c=>c!=="Preis vergleichen"),
        });
        return;
      }

      // Kraftstoff
      if (/kraftstoff|antrieb|motor(?!is)/i.test(txt) && !/alle.*vergleich|gesamt/i.test(txt)) {
        const fuelLabel = f => f==="elektro"?"Elektrisch":f==="hybrid"?"Hybrid":f==="diesel"?"Diesel":"Benziner";
        const types = [...new Set(selCars.map(c=>c.fuelType))];
        addBot({
          criterionCompare: {
            title: "Kraftstoffvergleich",
            rows: selCars.map((c,i)=>({
              rank: i+1,
              name: c.name,
              subtitle: c.gen,
              value: fuelLabel(c.fuelType),
              isBest: false,
            })),
            summary: types.length===1
              ? `Alle ${selCars.length} Modelle nutzen den gleichen Antrieb (${fuelLabel(types[0])}).`
              : `Die Modelle haben unterschiedliche Antriebsarten – ideal für einen direkten Effizienzvergleich.`,
          },
          chips: criterionChips.filter(c=>c!=="Kraftstoff vergleichen"),
        });
        return;
      }

      // Verbrauch
      if (/verbrauch|effizienz|sparsam|sparsamst/i.test(txt) && !/alle.*vergleich|gesamt/i.test(txt)) {
        addBot({
          criterionCompare: {
            title: "Verbrauchsvergleich",
            rows: selCars.map((c,i)=>({
              rank: i+1,
              name: c.name,
              subtitle: c.fuel,
              value: c.cons,
              isBest: false,
            })),
            summary: "Hinweis: Elektrofahrzeuge (kWh/100km) und Verbrenner (l/100km) sind nur innerhalb gleicher Antriebsart direkt vergleichbar.",
          },
          chips: criterionChips.filter(c=>c!=="Verbrauch vergleichen"),
        });
        return;
      }

      // Reichweite
      if (/reichweite|kilometer|km|weit.*fahren|strecke/i.test(txt) && !/alle.*vergleich|gesamt/i.test(txt)) {
        const sorted = [...selCars].sort((a,b)=>parseInt(b.range)-parseInt(a.range));
        addBot({
          criterionCompare: {
            title: "Reichweitenvergleich",
            rows: sorted.map((c,i)=>({
              rank: i+1,
              name: c.name,
              subtitle: c.fuel,
              value: c.range,
              isBest: i===0,
            })),
            summary: `Der ${sorted[0].name} bietet mit ${sorted[0].range} die größte Reichweite.`,
          },
          chips: criterionChips.filter(c=>c!=="Reichweite vergleichen"),
        });
        return;
      }

      // Baujahr
      if (/baujahr|hergestellt|generation|alter|neu(?:est)?/i.test(txt) && !/alle.*vergleich|gesamt/i.test(txt)) {
        addBot({
          criterionCompare: {
            title: "Baujahr & Generation",
            rows: selCars.map((c,i)=>({
              rank: i+1,
              name: c.name,
              subtitle: c.brand,
              value: c.years,
              isBest: false,
            })),
          },
          chips: criterionChips.filter(c=>c!=="Baujahr vergleichen"),
        });
        return;
      }

      // Ausstattung
      if (/ausstattung|feature|merkmal|extra|komfort|sicherheit.*vergleich/i.test(txt) && !/alle.*vergleich|gesamt/i.test(txt)) {
        const allFeatures = selCars.map(c=>new Set(c.ausstattung));
        const common = selCars[0].ausstattung.filter(a=>allFeatures.every(s=>s.has(a)));
        addBot({
          criterionCompare: {
            title: "Ausstattungsvergleich",
            rows: selCars.map((c,i)=>{
              const unique = c.ausstattung.filter(a=>!common.includes(a)).slice(0,3);
              return {
                rank: i+1,
                name: c.name,
                subtitle: unique.length>0 ? `Exklusiv: ${unique.join(", ")}` : "Keine exklusiven Features",
                value: `${c.ausstattung.length} Features`,
                isBest: c.ausstattung.length === Math.max(...selCars.map(x=>x.ausstattung.length)),
              };
            }),
            summary: common.length>0
              ? `Gemeinsam (${common.length}): ${common.slice(0,5).join(", ")}${common.length>5?" …":""}`
              : null,
          },
          chips: criterionChips.filter(c=>c!=="Ausstattung vergleichen"),
        });
        return;
      }

      // Gesamtvergleich (Tabelle)
      if (/gesamt|alle.*vergleich|komplett|übersicht|tabelle/i.test(txt)) {
        addBot({text:"Hier ist der Gesamtvergleich deiner ausgewählten Modelle:", compareCars:selCars, chips: criterionChips.filter(c=>c!=="Gesamtvergleich")});
        return;
      }
    }

    // ── Vergleich per Chat ──
    if (/vergleich|vergleiche|vs\.|versus/i.test(txt) || txt === "Modelle vergleichen" || txt === "Jetzt vergleichen" || txt.startsWith("⊕ Volvos") || txt.startsWith("⊕ Weiteres")) {
      if (txt === "⊕ Weiteres Modell hinzufügen") {
        addBot({text:`Du hast bereits ${selectedIds.length} Modell${selectedIds.length>1?"e":""} ausgewählt. Klicke auf weitere Kacheln, um sie hinzuzufügen.`});
        return;
      }
      if (txt === "Jetzt vergleichen" || txt === "Modelle vergleichen" || txt === "Modelle vergleichen" || txt.match(/^⊕ Volvos/)) {
        if (selectedIds.length >= 2) {
          const cmpCars = selectedIds.map(id=>CAR_DB.find(c=>c.id===id)).filter(Boolean);
          addBot({text:"Hier ist der direkte Vergleich deiner ausgewählten Modelle:", compareCars:cmpCars, chips:["Preis vergleichen","Kraftstoff vergleichen","Verbrauch vergleichen","Reichweite vergleichen","Ausstattung vergleichen"]});
          return;
        }
        addBot({text:'Wähle zuerst 2–3 Modelle durch Klick auf die Kacheln aus, dann kannst du sie vergleichen.'});
        return;
      }
      if (txt === "Auswahl zurücksetzen") {
        setSelectedIds([]);
        addBot({text:"Auswahl zurückgesetzt. Wähle neue Modelle durch Klick auf die Kacheln aus."});
        return;
      }
      const mentioned = CAR_DB.filter(c=>txt.toLowerCase().includes(c.name.toLowerCase())).slice(0,3);
      if (mentioned.length >= 2) {
        setSelectedIds(mentioned.map(c=>c.id));
        addBot({text:`Hier ist der Vergleich der ${mentioned.length} Modelle:`, compareCars:mentioned, chips:["Preis vergleichen","Verbrauch vergleichen","Reichweite vergleichen","Ausstattung vergleichen"]});
        return;
      }
      if (selectedIds.length >= 2) {
        const cmpCars = selectedIds.map(id=>CAR_DB.find(c=>c.id===id)).filter(Boolean);
        addBot({text:"Hier ist der Vergleich deiner ausgewählten Modelle:", compareCars:cmpCars, chips:["Preis vergleichen","Verbrauch vergleichen","Reichweite vergleichen","Ausstattung vergleichen"]});
        return;
      }
      addBot({text:'Wähle zuerst 2–3 Modelle durch Klick auf die Kacheln aus, dann kannst du sie vergleichen.', chips:["Neue Suche starten"]});
      return;
    }

    // ── Carousel intent chips ──
    if (/günstigste/i.test(txt) && lastCars.length > 0) {
      const cheapest = [...lastCars].sort((a,b)=>a.priceNum-b.priceNum)[0];
      setChip(cheapest); setStep("detail");
      addBot({text:`Das günstigste Modell ist der **${cheapest.name}** ${cheapest.price}. Möchtest du mehr Details?`, chips:["Motorisierung","Ausstattung","Verbrauch","Sicherheitsbewertung"]});
      return;
    }
    if (/elektro.?alternative|andere.*elektro/i.test(txt)) {
      const evCars = CAR_DB.filter(c=>c.fuelType==="elektro");
      showCarousel(evCars.slice(0,5), "Hier sind Elektro-Alternativen in deiner Kategorie:", {fuel:"elektro", compareActive:selectedIds.length>0});
      return;
    }
    if (/nur elektro|alle elektro/i.test(txt) && ctx.brand) {
      const filtered = CAR_DB.filter(c=>c.brand===ctx.brand && c.fuelType==="elektro");
      showCarousel(filtered.length>0?filtered:lastCars, `Alle Elektro-Modelle von ${ctx.brand}:`, {brand:ctx.brand, fuel:"elektro", compareActive:selectedIds.length>0});
      return;
    }
    if (/alle.*modelle ansehen|alle.*ansehen/i.test(txt)) {
      setModal(true);
      return;
    }
    if (/preisfilter|budget anpassen|anderes budget/i.test(txt)) {
      setStep("ask_budget"); setCtx(p=>({...p,price:null}));
      addBot({text:"Klar, passen wir das Budget an:", chips:["Bis 25.000 €","25.000 – 40.000 €","40.000 – 60.000 €","Über 60.000 €"]});
      return;
    }
    if (/anderen kraftstoff|kraftstoff ändern|kraftstoff wählen/i.test(txt)) {
      setStep("ask_fuel"); setCtx(p=>({...p,fuel:null}));
      addBot({text:"Welche Kraftstoffart soll ich stattdessen suchen?", chips:["Benzin","Diesel","Elektro","Hybrid"]});
      return;
    }
    if (/anderen fahrzeugtyp|fahrzeugtyp ändern|anderer typ/i.test(txt)) {
      setStep("ask_aufbau"); setCtx(p=>({...p,type:null}));
      addBot({text:"Welchen Fahrzeugtyp bevorzugst du?", chips:["Kombi","Van","SUV","Egal/Hauptsache praktisch"]});
      return;
    }
    if (/reichweite vergleichen/i.test(txt) && lastCars.length > 0) {
      const sorted = [...lastCars].sort((a,b)=>parseInt(b.range)-parseInt(a.range));
      addBot({text:`Reichweiten-Vergleich der aktuellen Modelle:\n${sorted.map((c,i)=>`${i+1}. **${c.name}**: ${c.range}`).join("\n")}`, chips:["Modelle vergleichen","Neue Suche starten"]});
      return;
    }

    const brand = detectBrand(txt) || curCtx.brand;
    const price = detectPrice(txt) || curCtx.price;
    const type  = detectType(txt)  || curCtx.type;
    const fuel  = detectFuel(txt)  || curCtx.fuel;

    // ── Thematic off-topic questions (always answer) ──
    if (/autokosten.*berechnen|autokosten.*rechner|💰.*autokosten/i.test(txt)) {
      addBot({text:"Gute Idee! Der **ADAC Autokosten-Rechner** zeigt dir die monatlichen Gesamtkosten für jedes Modell – inklusive Wertverlust, Versicherung, Steuer, Wartung und Kraftstoff.", adacTip:{title:"ADAC Autokosten", text:"Vergleiche die tatsächlichen monatlichen Kosten verschiedener Modelle – oft überraschend anders als der Kaufpreis vermuten lässt.", cta:"Zum Autokosten-Rechner", url:"https://www.adac.de/rund-ums-fahrzeug/auto-kaufen-verkaufen/autokosten/"}, chips:["Sparsam & effizient","Alltagstauglich","Sportlich","Ist mir nicht so wichtig"]});
      return;
    }
    if (/🔧.*pannenstatistik|pannenstatistik.*ansehen/i.test(txt)) {
      const b = curCtx.brand;
      const pannen = b ? (PANNEN_BY_BRAND[b]||"keine Daten") : null;
      if (b && pannen) {
        addBot({text:`Hier die Details zur **ADAC-Pannenstatistik** für **${b}**:\n\n🔧 Gesamtbewertung: **${pannen}**\n\nDie häufigsten Pannenursachen bei ${b}: Batterie- und Elektronikprobleme, gefolgt von Motor/Kraftstoffanlage. Die Statistik basiert auf über 3,5 Mio. ADAC-Pannenhilfeeinsätzen pro Jahr.`, adacTip:{title:"ADAC Pannenstatistik – vollständige Auswertung", text:"Detaillierte Aufschlüsselung nach Modell, Baujahr und Pannenursache auf adac.de.", cta:"Zur vollständigen Pannenstatistik", url:"https://www.adac.de/rund-ums-fahrzeug/unfall-schaden-panne/pannenstatistik/"}, chips:featureChips(curCtx)});
      } else {
        addBot({text:"Die **ADAC-Pannenstatistik** bewertet die Zuverlässigkeit nach Marke und Modell.", adacTip:{title:"ADAC Pannenstatistik", text:"Basierend auf über 3,5 Mio. Pannenhilfeeinsätzen pro Jahr – die umfangreichste Auswertung in Deutschland.", cta:"Zur Pannenstatistik", url:"https://www.adac.de/rund-ums-fahrzeug/unfall-schaden-panne/pannenstatistik/"}, chips:featureChips(curCtx)});
      }
      return;
    }
    if (/spritpreis|tankstelle|tankstellen|kindersitz/i.test(txt)) {
      if (/spritpreis/i.test(txt)) { addBot({text:"Aktuelle Spritpreise findest du direkt beim ADAC: adac.de/kraftstoffpreise – dort wird der Durchschnittspreis täglich aktualisiert."}); return; }
      if (/tankstelle/i.test(txt)) { addBot({text:"Für Tankstellen in deiner Nähe empfehle ich die ADAC-Tankstellensuche: adac.de/tankstellen – mit Preisvergleich in Echtzeit."}); return; }
      if (/kindersitz/i.test(txt)) { addBot({text:"Aktuelle Kindersitz-Tests und Empfehlungen findest du im ADAC-Artikel zum Thema: adac.de/kindersitze – dort werden regelmäßig neue Modelle getestet."}); return; }
    }

    // ── Car selected via chip ──
    if (curChip) {
      const c = curChip;
      if (/motorisierung|motor|ps|kw|leistung/i.test(txt)) {
        addBot({text:`Der **${c.name}** ist mit verschiedenen Motorvarianten erhältlich. Der Basismotor bietet solide Leistung für den Alltag, während Topversionen bis zu 300+ PS erreichen. Verbrauch: ${c.cons}.`, chips:["Verbrauch","Ausstattung","Preis","Sicherheitsbewertung"]});
        return;
      }
      if (/ausstattung/i.test(txt)) {
        addBot({text:`Der **${c.name}** bietet folgende Ausstattungsmerkmale:`, bullets:c.ausstattung, footer:`Möchtest du Details zu bestimmten Ausstattungen oder Informationen zu weiteren Bereichen wie Motorisierung, Verbrauch oder Preis?`, chips:["Motorisierung","Verbrauch","Preis","Sicherheitsbewertung"]});
        return;
      }
      if (/verbrauch|reichweite|effizienz/i.test(txt)) {
        addBot({text:`Der **${c.name}** verbraucht im Schnitt **${c.cons}** und erreicht eine Reichweite von **${c.range}**. Das macht ihn ${c.fuelType==="elektro"?"zu einem sparsamen Elektroauto":"zu einem effizienten Fahrzeug"} für den Alltag.`, chips:["Motorisierung","Ausstattung","Preis","Sicherheitsbewertung"]});
        return;
      }
      if (/preis|kosten|finanzierung|leasing/i.test(txt)) {
        const kostenInfo = c.kopiM ? `\n\nLaut **ADAC Autokosten** liegt der monatliche Gesamtunterhalt bei ca. **${c.kopiM} €** (inkl. Wertverlust, Versicherung, Wartung und Kraftstoff).` : "";
        addBot({text:`Der **${c.name}** ist ${c.price} erhältlich.${kostenInfo}\n\nFür aktuelle Leasing- und Finanzierungsangebote empfehle ich adac.de/fahrzeugwelt.`, chips:["Motorisierung","Ausstattung","Verbrauch","Sicherheitsbewertung"]});
        return;
      }
      if (/sicherheit|ncap|crash/i.test(txt)) {
        const stars = c.crashtest ? "**"+c.crashtest+" von 5 Sternen**" : "eine gute Bewertung";
        const rueckrufInfo = c.rueckrufe > 0 ? "\n\n⚠️ **Hinweis:** Für dieses Modell gibt es aktuell **"+c.rueckrufe+" offene(n) Rückruf(e)**. Details findest du auf adac.de/rueckrufe." : "\n\n✅ Aktuell sind **keine offenen Rückrufe** für dieses Modell bekannt.";
        const isFamily = ctx.usage === "familie";
        const familyHint = isFamily ? " Besonders wichtig für dich als Familienfahrer!" : "";
        addBot({text:`Der **${c.name}** hat im Euro NCAP-Crashtest ${stars} erreicht.${familyHint}\n\nSerienmäßige Sicherheitsausstattung: Notbremsassistent, Spurhalteassistent, Müdigkeitserkennung und Verkehrszeichenerkennung.${rueckrufInfo}`, chips:["Motorisierung","Ausstattung","Verbrauch","Preis","Pannenstatistik"]});
        return;
      }
      if (/panne|pannen|zuverlässig/i.test(txt)) {
        const pannen = c.pannen || PANNEN_BY_BRAND[c.brand] || "keine Daten";
        addBot({text:`In der **ADAC-Pannenstatistik** schneidet der **${c.name}** mit **${pannen}** ab.\n\nDie häufigsten Pannenursachen bei ${c.brand} sind Batterie- und Elektronikprobleme. Auf adac.de/pannenstatistik findest du die vollständige Auswertung nach Baujahr und Modell.`, chips:["Motorisierung","Ausstattung","Verbrauch","Preis","Sicherheit & Crashtest","ADAC Autotest","Pannenstatistik"]});
        return;
      }
      if (/autotest|test.*ergebnis|adac.*note/i.test(txt)) {
        const note = c.autotest || "–";
        addBot({text:`Der **${c.name}** hat im ADAC Autotest die Note **${note}** erhalten.\n\nDer Test umfasst Karosserie, Innenraum, Komfort, Motor, Fahreigenschaften, Sicherheit und Umwelt. Den vollständigen Testbericht findest du auf adac.de/autotest.`, chips:["Motorisierung","Ausstattung","Verbrauch","Preis","Sicherheit & Crashtest","ADAC Autotest","Pannenstatistik"]});
        return;
      }
      if (/ja|mehr|info|weiter/i.test(txt)) {
        addBot({text:`Super! Zu welchem Bereich möchtest du mehr wissen? Zum Beispiel Motorisierung, Ausstattung, Verbrauch, Preis oder etwas anderes?`, chips:["Motorisierung","Ausstattung","Verbrauch","Preis","Sicherheit & Crashtest","ADAC Autotest","Pannenstatistik"]});
        return;
      }
    }

    // ── Chip-Dialog: Fahrzeugauswahl erneut anzeigen ──
    if (/fahrzeugauswahl erneut|fahrzeugauswahl anzeigen|🚗/i.test(txt)) {
      if (lastCars.length > 0) {
        showCarousel(lastCars, "Hier ist deine bisherige Fahrzeugauswahl:", {brand:ctx.brand, fuel:ctx.fuel, compareActive:selectedIds.length>0});
        return;
      }
    }

    // ── Chip-Dialog: Andere Marken-Modelle ──
    if (/andere.*modelle entdecken/i.test(txt) && ctx.brand) {
      const brandCars = CAR_DB.filter(c=>c.brand===ctx.brand);
      showCarousel(brandCars, `Hier sind alle verfügbaren ${ctx.brand}-Modelle:`, {brand:ctx.brand, fuel:ctx.fuel, compareActive:selectedIds.length>0});
      return;
    }

    // ── Chip-Dialog: Hybrid-Modelle zeigen ──
    if (/auch hybrid|hybrid.*zeigen/i.test(txt)) {
      const hybridCars = CAR_DB.filter(c=>c.fuelType==="hybrid");
      showCarousel(hybridCars.length>0?hybridCars:lastCars, "Hier sind aktuelle Hybrid-Modelle:", {fuel:"hybrid", compareActive:selectedIds.length>0});
      return;
    }

    // ── Chip deleted → re-show carousel (legacy) ──
    if (/zurück zur auswahl|nochmal die auswahl|caroussel|bisherige auswahl/i.test(txt)) {
      if (lastCars.length > 0) {
        showCarousel(lastCars, "Hier nochmal die Modellauswahl – wähle ein anderes Fahrzeug:", {brand:ctx.brand, fuel:ctx.fuel, compareActive:selectedIds.length>0});
        return;
      }
    }

    // ═══════════════════════════════════════════════════════════
    //  V3: DIALOGISCHER TRICHTER – Nutzungskontext zuerst
    //  Reihenfolge: Nutzung → Aufbau → Antrieb → Budget → Leistung → Marke → Ausstattung
    // ═══════════════════════════════════════════════════════════

    if (curStep === "idle") {
      const dU = detectUsage(txt);
      const dA = detectAufbau(txt);
      const dF = detectFuel(txt);
      const dB = detectBrand(txt);
      const nc = {...curCtx, usage:dU, aufbau:dA, type:dA==="SUV"?"SUV":dA==="Kombi"?"Kombi":dA==="Van"?"Van":null, fuel:dF, brand:dB};
      setCtx(nc);
      const det = [dU,dA,dF,dB].filter(Boolean);
      const cnt = simCount(nc);
      if (det.length >= 1) {
        const parts = [];
        if (dB) parts.push("**"+dB+"**");
        if (dA) parts.push("**"+dA+"**");
        if (dF) parts.push("**"+(dF==="elektro"?"Elektro":dF==="hybrid"?"Hybrid":dF==="diesel"?"Diesel":"Benzin")+"**");
        if (dU) parts.push("für **"+(usageReaction(dU,{}).split("–")[0]||"").trim()+"**");
        const intro = "Das habe ich mitgenommen: "+parts.join(", ")+". Super, damit kann ich schon gut arbeiten!\n\n🔍 **"+fmtC(cnt)+" Treffer** in der ADAC-Datenbank – lass uns das eingrenzen.";
        if (!dU) { setStep("ask_usage"); addBot({text:intro+"\n\nEine wichtige Frage zuerst: Wofür wird das Fahrzeug hauptsächlich genutzt?", chips:["Pendeln & Stadt","Familie & Freizeit","Langstrecke & Reisen","Gewerbe & Transport","Spaß & Sport"]}); }
        else if (!dA) { setStep("ask_aufbau"); addBot({text:intro+"\n\n"+aufbauQuestion(nc), chips:aufbauChips(nc)}); }
        else if (!dF) { setStep("ask_fuel"); addBot({text:intro+"\n\n"+fuelQuestion(nc), chips:fuelChips(nc)}); }
        else { setStep("ask_budget"); addBot({text:intro+"\n\nDann lass uns noch über das Budget sprechen:", chips:budgetChips(nc)}); }
      } else {
        setStep("ask_usage");
        addBot({text:"Schön, dass du da bist! Ich bin dein ADAC-Fahrzeugberater und helfe dir, aus über **162.000 Modellen** genau das richtige zu finden.\n\nDamit ich dir die besten Vorschläge machen kann, stell ich dir ein paar kurze Fragen. Los geht's!\n\nWofür wird das Fahrzeug hauptsächlich genutzt?", chips:["Pendeln & Stadt","Familie & Freizeit","Langstrecke & Reisen","Gewerbe & Transport","Spaß & Sport"]});
      }
      return;
    }
    if (curStep === "ask_usage") {
      const u = detectUsage(txt) || "familie";
      const nc = {...curCtx, usage:u}; setCtx(nc);
      const r = usageReaction(u, nc);
      if (!nc.aufbau) { setStep("ask_aufbau"); addBot({text:r+"\n\n"+aufbauQuestion(nc), chips:aufbauChips(nc)}); }
      else if (!nc.fuel) { setStep("ask_fuel"); addBot({text:r+"\n\n"+fuelQuestion(nc), chips:fuelChips(nc)}); }
      else { setStep("ask_budget"); addBot({text:r+"\n\nDann lass uns über das Budget sprechen:", chips:budgetChips(nc)}); }
      return;
    }
    if (curStep === "ask_aufbau") {
      const a = detectAufbau(txt);
      const tMap = {SUV:"SUV",Kombi:"Kombi",Van:"Van"};
      const nc = {...curCtx, aufbau:a, type:tMap[a]||null}; setCtx(nc);
      const cnt = simCount(nc);
      const r = aufbauReaction(a, nc);
      if (!nc.fuel) { setStep("ask_fuel"); addBot({text:r+"\n\n🔍 **"+fmtC(cnt)+" Treffer** – "+fuelQuestion(nc), chips:fuelChips(nc)}); }
      else { setStep("ask_budget"); addBot({text:r+"\n\n🔍 **"+fmtC(cnt)+" Treffer** – dann lass uns über das Budget sprechen:", chips:budgetChips(nc)}); }
      return;
    }
    if (curStep === "ask_fuel") {
      const f = detectFuel(txt);
      const nc = {...curCtx, fuel:f}; setCtx(nc);
      const r = fuelReaction(f, nc);
      setStep("ask_budget");
      addBot({text:r+"\n\nWie sieht es beim Budget aus?", chips:budgetChips(nc)});
      return;
    }
    if (curStep === "ask_budget") {
      const p = detectPrice(txt) || (/bis 25|unter 25|günstig/i.test(txt)?"Bis 25.000 €":/25.*40|mittel/i.test(txt)?"25.000 – 40.000 €":/40.*60|gehoben/i.test(txt)?"40.000 – 60.000 €":/über 60|premium|luxus/i.test(txt)?"Über 60.000 €":null);
      const nc = {...curCtx, price:p}; setCtx(nc);
      const cnt = simCount(nc);
      const budgetLabel = p ? ({"Bis 25.000 €":"bis 25.000 Euro","25.000 – 40.000 €":"25 bis 40 Tausend","40.000 – 60.000 €":"40 bis 60 Tausend","Über 60.000 €":"im Premium-Segment"}[p]||"notiert") : "flexibel";
      const budgetText = p ? "Budget "+budgetLabel+" – da gibt es "+(nc.fuel==="elektro"?"richtig spannende Elektro-Modelle!":"eine gute Auswahl!") : "Flexibles Budget – da bleiben viele Türen offen.";
      const kostenTip = nc.fuel==="elektro"
        ? {title:"ADAC Autokosten-Tipp", text:"Bei E-Autos sind die monatlichen Gesamtkosten oft niedriger als erwartet – dank geringerer Wartung und Stromkosten.", cta:"Autokosten-Rechner öffnen", url:"https://www.adac.de/rund-ums-fahrzeug/auto-kaufen-verkaufen/autokosten/"}
        : nc.fuel==="diesel"
        ? {title:"ADAC Autokosten-Tipp", text:"Bei Diesel lohnt sich der Aufpreis ab ca. 15.000 km/Jahr. Der ADAC Autokosten-Rechner zeigt dir den Break-even.", cta:"Autokosten-Rechner öffnen", url:"https://www.adac.de/rund-ums-fahrzeug/auto-kaufen-verkaufen/autokosten/"}
        : {title:"ADAC Autokosten-Tipp", text:"Neben dem Kaufpreis zählen Versicherung, Steuer, Wartung und Kraftstoff. Der ADAC rechnet das für jedes Modell durch.", cta:"Autokosten-Rechner öffnen", url:"https://www.adac.de/rund-ums-fahrzeug/auto-kaufen-verkaufen/autokosten/"};
      setStep("ask_power");
      addBot({text:budgetText+"\n\n🔍 **"+fmtC(cnt)+" Treffer** – wir kommen der Sache näher!", adacTip:kostenTip, text2:"Noch eine kurze Frage zur Motorisierung:", chips:[...powerChips(nc), "💰 Autokosten berechnen"]});
      return;
    }
    if (curStep === "ask_power") {
      const pw = detectPower(txt);
      const nc = {...curCtx, power:pw}; setCtx(nc);
      const r = powerReaction(pw, nc);
      setStep("ask_brand");
      addBot({text:r+"\n\nGibt es eine Marke, die dich besonders interessiert – oder soll ich markenübergreifend die besten raussuchen?", chips:["BMW","Mercedes","Volvo","VW","Toyota","Hyundai","Bin offen für alles"]});
      return;
    }
    if (curStep === "ask_brand") {
      const b = detectBrand(txt) || (/offen|egal|keine|alle/i.test(txt)?null:null);
      const nc = {...curCtx, brand:b}; setCtx(nc);
      const cnt = simCount(nc);
      const pannen = b ? PANNEN_BY_BRAND[b] : null;
      const hasPannen = pannen && pannen !== "noch keine Daten";
      const r = b ? "**"+b+"** – gute Wahl, die haben aktuell einige spannende Modelle im Programm!" : "Ohne Markenbrille – so bekommst du den ehrlichsten Vergleich!";
      const pannenTip = (b && hasPannen) ? {title:"ADAC Pannenstatistik: "+b, text:b+" schneidet in der ADAC-Pannenstatistik mit \""+pannen+"\" ab. Die Bewertung basiert auf über 3,5 Mio. Pannenhilfeeinsätzen pro Jahr.", cta:"Pannenstatistik auf adac.de", url:"https://www.adac.de/rund-ums-fahrzeug/unfall-schaden-panne/pannenstatistik/"} : null;
      setStep("ask_features");
      addBot({text:r+"\n\n🔍 **"+fmtC(cnt)+" Treffer** – wir sind fast am Ziel! Eine letzte Frage: Gibt es ein Ausstattungsdetail, das dir besonders am Herzen liegt?", adacTip:pannenTip, chips:[...featureChips(nc), "🔧 Pannenstatistik ansehen"]});
      return;
    }
    if (curStep === "ask_features") {
      const auMap = {"sicherheit":["Notbremsassistent","Spurhalteassistent"],"komfort":["Sitzheizung","Lederausstattung","Klimaanlage"],"panoramadach":["Panoramadach"],"anhängerkupplung":["Anhängerkupplung"],"7 sitz":["7 Sitze"],"allrad":["Allradantrieb"]};
      const key = Object.keys(auMap).find(k=>txt.toLowerCase().includes(k));
      const prio = key ? auMap[key] : null;
      const seats7 = /7 sitz/i.test(txt) ? "7" : null;
      const nc = {...curCtx, ausstattungPrio:prio, seats:seats7}; setCtx(nc);
      setStep("results");

      // Top Empfehlungen: exakte Treffer
      const exact = filterCars(nc);
      // Starke Alternativen: gelockerte Filter (ohne Ausstattung/Leistung)
      const relaxed = filterCars({brand:nc.brand, price:nc.price, fuel:nc.fuel, type:nc.type}).filter(c => !exact.find(e=>e.id===c.id));
      // Breitere Suche: nur Antrieb + Typ
      const broad = filterCars({fuel:nc.fuel, type:nc.type}).filter(c => !exact.find(e=>e.id===c.id) && !relaxed.find(r=>r.id===c.id));
      // Preistipp: günstigste aus allen passenden
      const allMatches = [...exact, ...relaxed, ...broad];
      const priceSorted = [...allMatches].sort((a,b)=>a.priceNum-b.priceNum);

      // Tabs zusammenstellen – IMMER mindestens 7 Top Empfehlungen
      let topPool = [...exact, ...relaxed, ...broad];
      // Wenn immer noch zu wenig, alle Autos des passenden Typs/Fuels hinzufügen
      if (topPool.length < 7) {
        const extra = CAR_DB.filter(c => !topPool.find(t=>t.id===c.id));
        topPool = [...topPool, ...extra];
      }
      const topCars = topPool.slice(0, Math.max(7, exact.length + 2));
      const altCars = topPool.slice(topCars.length, topCars.length + 7);
      const cheapCars = [...topPool].sort((a,b)=>a.priceNum-b.priceNum).slice(0, 5);

      const isFamily = nc.usage==="familie";
      const featureIntro = key
        ? (key==="sicherheit" ? (isFamily?"Sicherheit – besonders mit Familie an Bord absolut richtig!":"Sicherheit hat Priorität – gute Entscheidung!") : "**"+key.charAt(0).toUpperCase()+key.slice(1)+"** wird berücksichtigt!")
        : "Perfekt, ich habe jetzt ein klares Bild!";

      const tabs = [
        {icon:"⭐", label:"Top Empfehlungen", cars:topCars, desc:"Diese Modelle passen am besten zu deinem Profil."},
      ];
      if (altCars.length > 0) tabs.push({icon:"💡", label:"Starke Alternativen", cars:altCars, desc:"Etwas andere Modelle, die ebenfalls interessant sein könnten."});
      if (cheapCars.length > 0) tabs.push({icon:"💰", label:"Preistipp", cars:cheapCars, desc:"Die günstigsten Optionen aus deiner Auswahl."});

      addBot({
        text: featureIntro+"\n\nVon über **162.000 Modellen** habe ich **"+allMatches.length+" passende** für dich gefunden:",
        tabbedCars: tabs,
        cta: "Klicke auf eine Kachel zum Auswählen, dann kannst du Modelle vergleichen.",
        chips: ["Modelle vergleichen","Suche verfeinern","Neue Suche starten"],
      });
      setLastCars(allMatches);
      return;
    }

    // ── RESULTS: car name mentioned → detail ──
    if (curStep === "results") {
      const match = CAR_DB.find(c => txt.toLowerCase().includes(c.name.toLowerCase()) || txt.includes(`(${c.code})`));
      if (match) {
        setChip(match); setStep("detail");
        addBot({text:`Du hast den **${match.name} ${match.gen} (${match.code})** ausgewählt. Möchtest du mehr Details zu diesem Modell erfahren, z.B. zu Motorisierung, Ausstattung, Verbrauch oder Preis? Stelle gerne eine gezielte Frage oder sage, welche Informationen dich interessieren!`, chips:["Motorisierung","Ausstattung","Verbrauch","Preis","Sicherheit & Crashtest","ADAC Autotest","Pannenstatistik"]});
        return;
      }
    }

    // ── Suche verfeinern (wenn User mit Ergebnissen nicht zufrieden ist) ──
    if (/andere.?modell|andere vorschläge|andere.?auto|andere.?fahrzeug|mehr auswahl|passt nicht|nicht zufrieden|gefällt.*nicht|suche verfeinern|genauer suchen|bessere ergebnisse|nochmal filtern|andere.?anzeig/i.test(txt) && (curStep === "results" || curStep === "detail" || lastCars.length > 0)) {
      setStep("refine_pick");
      suppressDeselectDialog.current = true;
      setSelectedIds([]);
      addBot({
        text:"Kein Problem! Ich kann die Suche gezielt verfeinern. Welches Kriterium möchtest du anpassen?",
        chips:["Reichweite eingrenzen","Ausstattung priorisieren","Marke wählen","Sitzplätze festlegen"],
      });
      return;
    }

    // ── REFINE_PICK → route to specific refinement question ──
    if (curStep === "refine_pick") {
      if (/reichweite/i.test(txt)) {
        setStep("refine_range");
        addBot({text:"Wie viel Reichweite brauchst du mindestens?", chips:["Unter 300 km","300–500 km","500–700 km","Über 700 km"]});
        return;
      }
      if (/ausstattung/i.test(txt)) {
        setStep("refine_ausstattung");
        addBot({text:"Was ist dir bei der Ausstattung am wichtigsten?", chips:["Sicherheit","Komfort & Leder","Panoramadach","Anhängerkupplung","Allradantrieb","Navigationssystem"]});
        return;
      }
      if (/marke/i.test(txt)) {
        setStep("refine_brand");
        const availableBrands = [...new Set(CAR_DB.map(c=>c.brand))].sort();
        addBot({text:"Welche Marke bevorzugst du?", chips:availableBrands.slice(0,6).concat(["Keine Präferenz"])});
        return;
      }
      if (/sitz/i.test(txt)) {
        setStep("refine_seats");
        addBot({text:"Wie viele Sitzplätze benötigst du?", chips:["5 Sitze (Standard)","7 Sitze (Großfamilie)"]});
        return;
      }
      // Fallback in refine_pick
      setStep("refine_pick");
      addBot({text:"Bitte wähle ein Kriterium:", chips:["Reichweite eingrenzen","Ausstattung priorisieren","Marke wählen","Sitzplätze festlegen"]});
      return;
    }

    // ── REFINE_RANGE → apply and re-filter ──
    if (curStep === "refine_range") {
      let minR = 0;
      if (/unter 300|kurzstrecke/i.test(txt)) minR = 0;
      else if (/300.*500|mittel/i.test(txt)) minR = 300;
      else if (/500.*700/i.test(txt)) minR = 500;
      else if (/über 700|700\+|langstrecke/i.test(txt)) minR = 700;
      else minR = parseInt(txt) || 0;
      const newCtx = {...curCtx, minRange:minR};
      setCtx(newCtx);
      const results = filterCars(newCtx);
      if (results.length > 0) {
        setStep("results");
        showCarousel(results, `Hier sind Fahrzeuge mit mindestens ${minR} km Reichweite:`, {brand:newCtx.brand, fuel:newCtx.fuel, compareActive:selectedIds.length>0});
      } else {
        setStep("results");
        showCarousel(lastCars, `Keine Treffer mit ${minR}+ km Reichweite. Hier die bisherige Auswahl:`, {brand:newCtx.brand, fuel:newCtx.fuel, compareActive:selectedIds.length>0});
      }
      return;
    }

    // ── REFINE_AUSSTATTUNG → apply and re-filter ──
    if (curStep === "refine_ausstattung") {
      const ausstattungMap = {
        "sicherheit": ["Notbremsassistent","Spurhalteassistent","Fußgängererkennung"],
        "komfort": ["Sitzheizung","Lederausstattung","Klimaanlage"],
        "panoramadach": ["Panoramadach"],
        "anhängerkupplung": ["Anhängerkupplung"],
        "allrad": ["Allradantrieb"],
        "navigation": ["Navigationssystem"],
      };
      const key = Object.keys(ausstattungMap).find(k => txt.toLowerCase().includes(k));
      const prio = key ? ausstattungMap[key] : [txt];
      const newCtx = {...curCtx, ausstattungPrio:prio};
      setCtx(newCtx);
      const results = filterCars(newCtx);
      if (results.length > 0) {
        setStep("results");
        showCarousel(results, `Hier sind Fahrzeuge mit **${key || txt}** als Ausstattungsschwerpunkt:`, {brand:newCtx.brand, fuel:newCtx.fuel, compareActive:selectedIds.length>0});
      } else {
        setStep("results");
        const relaxed = filterCars({...newCtx, ausstattungPrio:null});
        showCarousel(relaxed.length > 0 ? relaxed : lastCars, `Kein Treffer für dieses Ausstattungsmerkmal. Hier ähnliche Modelle:`, {brand:newCtx.brand, fuel:newCtx.fuel, compareActive:selectedIds.length>0});
      }
      return;
    }

    // ── REFINE_BRAND → apply and re-filter ──
    if (curStep === "refine_brand") {
      if (/keine präferenz|egal/i.test(txt)) {
        const newCtx = {...curCtx, brand:null};
        setCtx(newCtx);
        const results = filterCars(newCtx);
        setStep("results");
        showCarousel(results.length > 0 ? results : lastCars, "Hier sind Fahrzeuge aller Marken:", {fuel:newCtx.fuel, compareActive:selectedIds.length>0});
      } else {
        const brandName = detectBrand(txt) || txt.trim();
        const newCtx = {...curCtx, brand:brandName};
        setCtx(newCtx);
        const results = filterCars(newCtx);
        if (results.length > 0) {
          setStep("results");
          showCarousel(results, `Hier sind **${brandName}**-Modelle passend zu deinen Kriterien:`, {brand:brandName, fuel:newCtx.fuel, compareActive:selectedIds.length>0});
        } else {
          const allBrand = CAR_DB.filter(c=>c.brand.toLowerCase()===brandName.toLowerCase());
          setStep("results");
          showCarousel(allBrand.length > 0 ? allBrand : lastCars, allBrand.length > 0 ? `Keine exakten Treffer – hier alle ${brandName}-Modelle:` : `Marke nicht gefunden. Hier die bisherige Auswahl:`, {brand:brandName, fuel:newCtx.fuel, compareActive:selectedIds.length>0});
        }
      }
      return;
    }

    // ── REFINE_SEATS → apply and re-filter ──
    if (curStep === "refine_seats") {
      const wantsSeven = /7|sieben|groß/i.test(txt);
      const newCtx = {...curCtx, seats: wantsSeven ? "7" : "5"};
      setCtx(newCtx);
      const results = filterCars(newCtx);
      if (results.length > 0) {
        setStep("results");
        showCarousel(results, wantsSeven ? "Hier sind Fahrzeuge mit **7 Sitzplätzen**:" : "Hier sind Fahrzeuge mit **5 Sitzplätzen**:", {brand:newCtx.brand, fuel:newCtx.fuel, compareActive:selectedIds.length>0});
      } else {
        setStep("results");
        showCarousel(lastCars, `Keine Treffer mit ${wantsSeven?"7":"5"} Sitzen in dieser Kombination. Hier die bisherige Auswahl:`, {brand:newCtx.brand, fuel:newCtx.fuel, compareActive:selectedIds.length>0});
      }
      return;
    }

    // ── Neue Suche ──
    if (/neue suche|neu starten|zurücksetzen|nochmal von vorne/i.test(txt)) {
      setStep("idle"); setCtx({usage:null,aufbau:null,brand:null,price:null,type:null,fuel:null,power:null,minRange:null,ausstattungPrio:null,seats:null}); setChip(null); setLastCars([]);
      suppressDeselectDialog.current = true;
      setSelectedIds([]);
      addBot({text:"Kein Problem – beschreib mir einfach, was du suchst, und ich helfe dir weiter!"});
      return;
    }

    // ── Fallback ──
    addBot({text:"Ich helfe dir gerne! Nenn mir einfach eine Marke, dein Budget oder den gewünschten Fahrzeugtyp – oder stelle eine Frage zu einem der angezeigten Modelle.", chips:["Neue Suche starten","Ich suche einen Volvo","Elektroautos bis 50.000 €"]});
  };

  const send = (txt) => {
    const text = (txt || input).trim();
    if (!text) return;
    addUser(text); setInput("");
    const curStep = step, curCtx = ctx, curChip = chip;
    setTyping(true);
    setTimeout(() => { process(text, curStep, curCtx, curChip); setTyping(false); }, 600+Math.random()*350);
  };

  const handleKey = (e) => { if (e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();} };

  const lastBot = [...messages].reverse().find(m=>m.role==="bot");
  const criterionKeywords = ["vergleichen","Gesamtvergleich","Auswahl zurücksetzen","Jetzt vergleichen"];
  const rawChips = !typing && lastBot?.chips ? lastBot.chips : [];
  // Hide criterion/comparison chips when no cars are selected
  const chips = selectedIds.length === 0
    ? rawChips.filter(c => !criterionKeywords.some(k => c.includes(k)))
    : rawChips;
  const bold = (t) => t?.split(/\*\*(.*?)\*\*/g).map((p,i)=>i%2===1?<strong key={i}>{p}</strong>:p);

  return (
    <div style={s.root}>
      <div style={s.wrap}>
        {!started ? (
          <>
            <WelcomeScreen onStart={msg=>{setStarted(true);setTimeout(()=>send(msg),80);}}/>
            <InputBar input={input} setInput={setInput} onSend={()=>{setStarted(true);send();}}
              onKey={e=>{if(e.key==="Enter"){setStarted(true);send();}}}
              inputRef={inputRef} selectedCars={[]} onDeselectCar={()=>{}}/>
          </>
        ) : (
          <>
            <div style={s.messages}>
              {messages.map(msg => msg.role==="user" ? (
                <div key={msg.id} style={s.userRow}>
                  <div style={s.uName}>Max Mustermann · {msg.time}</div>
                  <div style={s.uBubble}>{msg.text}</div>
                </div>
              ) : (
                <div key={msg.id} style={s.botRow}>
                  <div style={s.botHead}>
                    <div style={s.avatar}><StarIcon/></div>
                    <div><div style={s.botName}>KI-Assistent</div><div style={s.botTime}>{msg.time}</div></div>
                  </div>
                  <div style={s.botBody}>
                    {msg.text && <p style={s.botTxt}>{bold(msg.text)}</p>}
                    {msg.adacTip && (
                      <div style={s.adacTip}>
                        <div style={s.adacTipHeader}>
                          <span style={s.adacTipLogo}>ADAC</span>
                          <span style={s.adacTipTitle}>{msg.adacTip.title}</span>
                        </div>
                        <div style={s.adacTipText}>{msg.adacTip.text}</div>
                        <a href={msg.adacTip.url} target="_blank" rel="noreferrer" style={s.adacTipCta}>{msg.adacTip.cta} →</a>
                      </div>
                    )}
                    {msg.text2 && <p style={s.botTxt}>{bold(msg.text2)}</p>}
                    {msg.tip  && <div style={s.tip}><span>💡</span><span style={{marginLeft:8,fontSize:13,color:"#444"}}>{msg.tip}</span></div>}
                    {msg.cars?.length>0 && (
                      <CarCarousel
                        cars={msg.cars}
                        selectedIds={selectedIds}
                        onToggleSelect={toggleSelect}
                        totalCount={msg.cars.length}
                        onShowAll={()=>setModal(true)}
                      />
                    )}
                    {msg.tabbedCars?.length>0 && (
                      <TabbedCarousel
                        tabs={msg.tabbedCars}
                        selectedIds={selectedIds}
                        onToggleSelect={toggleSelect}
                        onShowAll={()=>setModal(true)}
                      />
                    )}
                    {msg.compareCars?.length>=2 && (
                      <ComparisonTable cars={msg.compareCars}/>
                    )}
                    {msg.criterionCompare && (
                      <CriterionCompare data={msg.criterionCompare}/>
                    )}
                    {msg.bullets?.length>0 && (
                      <ul style={s.bullets}>
                        {msg.bullets.map((b,i)=><li key={i}>{b}</li>)}
                      </ul>
                    )}
                    {msg.cta    && <p style={{...s.botTxt,marginTop:8}}>{msg.cta}</p>}
                    {msg.footer && <p style={{...s.botTxt,marginTop:8}}>{msg.footer}</p>}
                    <div style={s.expert}>
                      <span style={s.expertQ}>Sie brauchen andere Informationen?</span>
                      <a href="#" style={s.expertL}>Kontakt mit einem Experten aufnehmen</a>
                    </div>
                  </div>
                </div>
              ))}

              {typing && (
                <div style={s.botRow}>
                  <div style={s.botHead}>
                    <div style={s.avatar}><StarIcon/></div>
                    <div><div style={s.botName}>KI-Assistent</div><div style={s.botTime}>{ts()}</div></div>
                  </div>
                  <div style={s.botBody}>
                    <div style={s.dots}>{[0,180,360].map(d=><span key={d} style={{...s.dot,animationDelay:`${d}ms`}}/>)}</div>
                  </div>
                </div>
              )}
              <div ref={bottomRef}/>
            </div>

            {chips.length>0 && (
              <div style={s.chipsRow}>
                {chips.map((c,i)=>(
                  <button key={i} style={s.chip} onClick={()=>send(c)}
                    onMouseEnter={e=>e.currentTarget.style.background="#f5f5f5"}
                    onMouseLeave={e=>e.currentTarget.style.background="#fff"}>{c}</button>
                ))}
              </div>
            )}

            <InputBar input={input} setInput={setInput} onSend={()=>send()} onKey={handleKey}
              inputRef={inputRef}
              selectedCars={selectedCars}
              onDeselectCar={id=>setSelectedIds(p=>p.filter(x=>x!==id))}/>
          </>
        )}

        <div style={s.footer}>
          Unsere KI-Suche generiert Ergebnisse computerbasiert und ohne Gewähr auf Richtigkeit.{" "}
          <a href="https://www.adac.de/datenschutz/" target="_blank" rel="noreferrer" style={s.footerL}>Datenschutz</a>
        </div>
      </div>

      {modal && <HandoffModal cars={lastCars} ctx={ctx} onClose={()=>setModal(false)}
        onSelect={c=>{
          setChip(c); setStep("detail");
          addUser(`${c.name} ${c.gen} (${c.code})`);
          setTyping(true);
          setTimeout(()=>{
            addBot({text:`Du hast den **${c.name} ${c.gen} (${c.code})** ausgewählt. Möchtest du mehr Details erfahren?`, chips:["Motorisierung","Ausstattung","Verbrauch","Preis","Sicherheit & Crashtest","ADAC Autotest","Pannenstatistik"]});
            setTyping(false);
          },600);
        }}
        onRefine={()=>{
          addBot({text:"Kein Problem! Wie möchtest du die Suche anpassen?", chips:["Preisfilter anpassen","Anderen Kraftstoff wählen","Anderen Fahrzeugtyp","Neue Suche starten"]});
        }}
        onOpenAdac={()=>setAdacPage(true)}
      />}

      {adacPage && <ADACSuchePage cars={lastCars.length>0 ? lastCars : CAR_DB} ctx={ctx}
        onClose={()=>setAdacPage(false)}
        onSelectCar={c=>{
          setChip(c); setStep("detail");
          addUser(`${c.name} ${c.gen} (${c.code})`);
          setTyping(true);
          setTimeout(()=>{
            addBot({text:`Du hast den **${c.name} ${c.gen} (${c.code})** auf adac.de ausgewählt. Möchtest du mehr Details erfahren?`, chips:["Motorisierung","Ausstattung","Verbrauch","Preis","Sicherheit & Crashtest","ADAC Autotest","Pannenstatistik"]});
            setTyping(false);
          },600);
        }}
      />}

      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Zilla+Slab:wght@700&display=swap');
        *{box-sizing:border-box;} body{margin:0;background:#f0f2f5;}
        @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-5px);opacity:1}}
        @keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
        input::placeholder{color:#aaa;} input:focus{outline:none;}
        ::-webkit-scrollbar{width:4px;height:4px;}
        ::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}
        ul{margin:6px 0 10px;padding-left:20px;}
        ul li{font-size:14px;color:#1a1a1a;margin-bottom:5px;line-height:1.5;}
      `}</style>
    </div>
  );
}

function InputBar({input,setInput,onSend,onKey,inputRef,selectedCars,onDeselectCar}) {
  const hasChips = selectedCars.length > 0;
  return (
    <div style={s.inputWrap}>
      <div style={{
        border:"1px solid #D1D5DB",
        borderRadius:8,
        overflow:"hidden",
        background:"#fff",
      }}>
        {/* Selected cars chips on gray background */}
        {hasChips && (
          <div style={s.chipsArea}>
            {selectedCars.map(c=>(
              <div key={c.id} style={s.selectedChip}>
                <button style={s.selectedChipX} onClick={()=>onDeselectCar(c.id)}>
                  <CloseIcon size={9} color="#333"/>
                </button>
                <span style={s.selectedChipLbl}>{c.name} {c.gen} ({c.code})</span>
              </div>
            ))}
          </div>
        )}
        {/* Input field – rectangular, no own border */}
        <div style={s.inputInner}>
          <input ref={inputRef} style={s.input} value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={onKey} placeholder="Geben sie eine Nachricht ein..."/>
          <button style={s.sendBtn} onClick={onSend}><SendBtn/></button>
        </div>
      </div>
    </div>
  );
}

const s = {
  root:{minHeight:"100vh",background:"#f0f2f5",display:"flex",justifyContent:"center",fontFamily:"'Inter',sans-serif"},
  wrap:{width:"100%",maxWidth:900,background:"#fff",display:"flex",flexDirection:"column",minHeight:"100vh"},
  messages:{flex:1,overflowY:"auto",padding:"28px 52px 12px"},
  userRow:{display:"flex",flexDirection:"column",alignItems:"flex-end",marginBottom:22},
  uName:{fontSize:12,color:"#888",fontWeight:500,marginBottom:5},
  uBubble:{background:"#F3F4F6",borderRadius:10,padding:"10px 16px",fontSize:14,color:"#1a1a1a",maxWidth:"60%",lineHeight:1.55},
  botRow:{marginBottom:26},
  botHead:{display:"flex",alignItems:"center",gap:10,marginBottom:6},
  avatar:{width:36,height:36,borderRadius:"50%",background:"#FFCC00",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0},
  botName:{fontSize:14,fontWeight:600,color:"#1a1a1a"},
  botTime:{fontSize:11,color:"#999"},
  botBody:{paddingLeft:46},
  botTxt:{fontSize:14,color:"#1a1a1a",margin:"0 0 8px",lineHeight:1.65},
  tip:{display:"flex",alignItems:"center",background:"#FAFAFA",border:"1px solid #EBEBEB",borderRadius:8,padding:"8px 14px",marginBottom:12,marginTop:4},
  bullets:{},
  expert:{marginTop:8},
  expertQ:{fontSize:12,color:"#999",display:"block"},
  expertL:{fontSize:12,color:"#1a1a1a",textDecoration:"underline",display:"inline-block",marginTop:2},
  dots:{display:"flex",gap:5,padding:"6px 0"},
  dot:{width:8,height:8,borderRadius:"50%",background:"#FFCC00",display:"inline-block",animation:"bounce 1.2s infinite"},
  chipsRow:{display:"flex",flexWrap:"wrap",gap:8,padding:"4px 52px 14px"},
  chip:{background:"#fff",border:"1px solid #D1D5DB",borderRadius:8,padding:"7px 16px",fontSize:13,color:"#1a1a1a",cursor:"pointer",transition:"background 0.15s",whiteSpace:"nowrap"},
  // New input area styles
  inputWrap:{padding:"0 36px 16px",flexShrink:0},
  chipsArea:{display:"flex",flexWrap:"wrap",gap:8,padding:"14px 16px 10px",background:"#F3F4F6",borderBottom:"1px solid #E5E7EB"},
  selectedChip:{display:"flex",alignItems:"center",background:"#FFCC00",borderRadius:6,padding:"6px 12px 6px 8px",gap:7,flexShrink:0},
  selectedChipX:{border:"none",cursor:"pointer",padding:0,display:"flex",alignItems:"center",flexShrink:0,width:18,height:18,borderRadius:"50%",justifyContent:"center",background:"rgba(0,0,0,0.08)"},
  selectedChipLbl:{fontSize:13,fontWeight:500,color:"#1a1a1a",whiteSpace:"nowrap"},
  inputInner:{display:"flex",alignItems:"center",padding:"10px 10px 10px 4px",background:"#fff",gap:6},
  input:{flex:1,border:"none",background:"transparent",fontSize:14,color:"#1a1a1a",padding:"2px 12px",fontFamily:"'Inter',sans-serif"},
  sendBtn:{background:"transparent",border:"none",cursor:"pointer",display:"flex",alignItems:"center",padding:0,flexShrink:0},
  footer:{textAlign:"center",padding:"10px 24px 14px",fontSize:11,color:"#aaa",borderTop:"1px solid #F3F3F3"},
  footerL:{color:"#666",textDecoration:"underline"},
  adacTip:{background:"#FFFBEA",border:"1px solid #FFCC00",borderRadius:10,padding:"12px 14px",marginBottom:12,marginTop:8},
  adacTipHeader:{display:"flex",alignItems:"center",gap:8,marginBottom:6},
  adacTipLogo:{background:"#FFCC00",color:"#1a1a1a",fontSize:10,fontWeight:700,padding:"2px 6px",borderRadius:4},
  adacTipTitle:{fontSize:13,fontWeight:600,color:"#1a1a1a"},
  adacTipText:{fontSize:12,color:"#555",lineHeight:1.5,marginBottom:8},
  adacTipCta:{fontSize:12,fontWeight:600,color:"#1a1a1a",textDecoration:"none",background:"#FFCC00",padding:"6px 14px",borderRadius:6,display:"inline-block"},
};

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(ADACAssistant));
</script>
</body>
</html>
